name: MENA Newsstand

# WHAT THIS WORKFLOW DOES (plain English)
# =========================================
# EVERY RUN (every 30 minutes via cron-job.org):
#   - scripts/fetch_headlines.py  → refreshes headlines.json
#
# EVERY 6 HOURS (first run crossing 00:00 / 06:00 / 12:00 / 18:00 Israel time):
#   - scripts/build_briefing.py   → fetches world feeds + MENA headlines,
#                                   calls Gemini, writes briefing.json
#   - scripts/send_email.py       → sends the digest email (if secrets set)
#
# ONCE A DAY at ~07:00 Israel time (morning):
#   - scripts/fetch_frontpages.py → downloads today's newspaper cover images
#
# ONCE A DAY at ~14:00 Israel time (afternoon):
#   - scripts/fetch_frontpages.py → re-downloads to catch later editions
#
# HOW THE 30-MINUTE SCHEDULE WORKS
# ==================================
# GitHub's own timed schedule ("cron") is unreliable and often runs late or
# gets skipped. So the primary trigger is an external service (cron-job.org)
# that calls this workflow via the "workflow_dispatch" trigger every 30 minutes
# like clockwork. The schedule lines below are just a backup in case that
# external service ever has a problem.
#
# scripts/plan_run.py acts as a gatekeeper: it checks the current time in
# Israel and state/daily.json to make sure each timed task runs exactly once
# per slot — even if the trigger fires a bit late.

on:
  schedule:
    - cron: '15,45 * * * *'   # backup heartbeat (cron-job.org is the primary)
  workflow_dispatch:           # primary 30-min heartbeat + manual runs
    inputs:
      send_email:
        description: 'Force-send the email digest now'
        type: boolean
        default: false
      refresh_frontpages:
        description: 'Force-refresh front-page images now'
        type: boolean
        default: false

permissions:
  contents: write

# Serialise runs so concurrent jobs never race on git push.
concurrency:
  group: newsstand-data
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
      EMAIL_TO:       ${{ secrets.EMAIL_TO }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Plan the run
        env:
          FORCE_EMAIL:       ${{ github.event.inputs.send_email }}
          FORCE_FRONTPAGES:  ${{ github.event.inputs.refresh_frontpages }}
        run: python scripts/plan_run.py

      - name: Fetch headlines
        run: python scripts/fetch_headlines.py

      # Media Pulse word cloud — cheap, no API, runs every refresh.
      - name: Build media pulse
        continue-on-error: true
        run: python scripts/build_pulse.py

      # Build the world briefing every 6 hours. continue-on-error so a Gemini
      # quota or network hiccup never blocks the headlines commit or email.
      - name: Build world briefing
        if: ${{ env.DO_BRIEFING == 'true' }}
        continue-on-error: true
        run: python scripts/build_briefing.py

      # Front-page images: downloaded on morning + afternoon runs only.
      # continue-on-error: a CDN outage must never block headlines or email.
      - name: Fetch front pages
        if: ${{ env.DO_FRONTPAGES == 'true' }}
        continue-on-error: true
        run: python scripts/fetch_frontpages.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add headlines.json state/daily.json
          git add pulse.json 2>/dev/null || true
          git add briefing.json 2>/dev/null || true
          git add frontpages 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "chore: refresh data $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push origin main; then
                echo "Pushed."; break
              fi
              echo "Push attempt $i failed; retrying…"; sleep $((i * 3))
            done
          fi

      # Send email after the commit so it links to the freshest data. always()
      # means it runs even if the front-page or push step had trouble.
      - name: Send email digest
        if: ${{ always() && env.DO_EMAIL == 'true' && env.EMAIL_FROM != '' }}
        run: python scripts/send_email.py

      - name: Email skipped notice
        if: ${{ always() && env.DO_EMAIL == 'true' && env.EMAIL_FROM == '' }}
        run: |
          echo "::warning::Email digest skipped — EMAIL_FROM/EMAIL_TO/EMAIL_PASSWORD"
          echo "repository secrets are not set. Add them under Settings →"
          echo "Secrets and variables → Actions for the digest emails to send."
