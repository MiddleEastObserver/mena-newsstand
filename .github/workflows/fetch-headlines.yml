name: MENA Newsstand

# One integrated job drives everything:
#   • every 30 min  → refresh headlines.json ONLY (keeps the Headlines tab live)
#   • 04:05 UTC     → full run: headlines + front-page images + morning email
#   • 11:05 UTC     → refresh front-page images (Western editions are up by now)
#   • manual run    → headlines only, unless you tick the email / front-page boxes
#
# IMPORTANT: the every-30-min refresh is driven by an external cron-job.org
# trigger that calls the workflow_dispatch API with NO inputs. A plain dispatch
# must therefore do HEADLINES ONLY — never the email or front pages — or you'd
# get an email every 30 minutes. Email + front pages only happen on the daily
# schedule (or when you explicitly tick the boxes on a manual run).
#
# Cron minutes are deliberately off the hour. GitHub de-prioritises scheduled
# runs at :00 under load, which is why the old '0 7 * * *' job kept getting
# dropped. Offsetting to :05/:15/:45 makes runs far more reliable.

on:
  schedule:
    - cron: '15,45 * * * *'   # every 30 min — headlines only
    - cron: '5 4 * * *'       # daily 04:05 UTC ≈ 07:05 Israel — headlines + front pages + email
    - cron: '5 11 * * *'      # daily 11:05 UTC — refresh front pages
  workflow_dispatch:           # manual trigger — headlines only by default
    inputs:
      send_email:
        description: 'Also send the email digest'
        type: boolean
        default: false
      refresh_frontpages:
        description: 'Also refresh front-page images'
        type: boolean
        default: false

permissions:
  contents: write

# Serialise runs so the 30-min and daily jobs never race on git push.
concurrency:
  group: newsstand-data
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Determine run type
        run: |
          EVENT="${{ github.event_name }}"
          SCHED="${{ github.event.schedule }}"
          EMAIL_IN="${{ github.event.inputs.send_email }}"
          FP_IN="${{ github.event.inputs.refresh_frontpages }}"
          DO_FP=false
          DO_EMAIL=false
          # Daily full run: headlines + front pages + email.
          if [ "$SCHED" = "5 4 * * *" ]; then DO_FP=true; DO_EMAIL=true; fi
          # Midday: refresh front pages only.
          if [ "$SCHED" = "5 11 * * *" ]; then DO_FP=true; fi
          # Manual / cron-job.org dispatch: headlines only, unless explicitly
          # opted in. cron-job.org's 30-min trigger sends no inputs, so both
          # stay false and only headlines refresh.
          if [ "$EVENT" = "workflow_dispatch" ]; then
            [ "$FP_IN" = "true" ] && DO_FP=true
            [ "$EMAIL_IN" = "true" ] && DO_EMAIL=true
          fi
          echo "DO_FRONTPAGES=$DO_FP" >> "$GITHUB_ENV"
          echo "DO_EMAIL=$DO_EMAIL" >> "$GITHUB_ENV"
          echo "event=$EVENT schedule='$SCHED' frontpages=$DO_FP email=$DO_EMAIL"

      - name: Fetch headlines
        run: python scripts/fetch_headlines.py

      # continue-on-error: a bad day at the cover CDNs must never block the
      # headlines refresh or the morning email. The script already exits 0 on
      # partial failure; this guards against an unexpected crash too.
      - name: Fetch front pages
        if: ${{ env.DO_FRONTPAGES == 'true' }}
        continue-on-error: true
        run: python scripts/fetch_frontpages.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # frontpages/ only exists on full runs; never let a missing pathspec
          # fail the headlines-only (every-30-min) commit.
          git add headlines.json
          git add frontpages 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "chore: refresh data $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push origin main; then
                echo "Pushed."; break
              fi
              echo "Push attempt $i failed; retrying…"; sleep $((i * 3))
            done
          fi

      # always(): the digest must go out even if the front-page or push step
      # had trouble, as long as this is a full run and the secrets are set.
      - name: Send email digest
        if: ${{ always() && env.DO_EMAIL == 'true' && env.EMAIL_FROM != '' }}
        run: python scripts/send_email.py

      - name: Email skipped notice
        if: ${{ always() && env.DO_EMAIL == 'true' && env.EMAIL_FROM == '' }}
        run: |
          echo "::warning::Email digest skipped — EMAIL_FROM/EMAIL_TO/EMAIL_PASSWORD"
          echo "repository secrets are not set. Add them under Settings →"
          echo "Secrets and variables → Actions for the morning email to send."
