name: Fetch MENA Headlines

on:
  schedule:
    - cron: '0 7 * * *'   # Daily at 07:00 UTC
  workflow_dispatch:        # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Fetch headlines
        run: python scripts/fetch_headlines.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add headlines.json
          if git diff --cached --quiet; then
            echo "headlines.json unchanged — nothing to commit"
          else
            git commit -m "chore: update headlines $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin main
          fi
